  .sec img{
    display:block;
    width:100%;

  }

  /* 画像内ボタンだけをリンク化する透明領域（ホットスポット） */

    position:absolute;
    display:block;
    z-index:10;
    cursor:pointer;

    background:transparent;
    border-radius:999px;

  /* スクロールでふわっと表示 */
  .reveal{
    opacity:0;
    transform:translateY(28px);
    transition:opacity .9s ease, transform .9s ease;
    will-change:opacity,transform;
  }
  .reveal.show{opacity:1;transform:none;}

  /* 金粉キャンバス（画面に固定し、見えている範囲だけ描画＝軽量） */
  #gold{
    position:fixed;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:var(--max);
    height:100vh;
    height:100dvh;
    pointer-events:none;
    z-index:20;
  }

  /* 常時表示の予約ボタン */
  .cta-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%) translateY(120%);
    bottom:0;
    width:100%;
    max-width:var(--max);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(14,10,26,.96) 60%, rgba(14,10,26,0));
    z-index:30;
    transition:transform .5s cubic-bezier(.22,1,.36,1);
  }
  .cta-bar.visible{transform:translateX(-50%) translateY(0);}
  .cta-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px 20px;border-radius:999px;
    background:linear-gradient(135deg,var(--cta-1),var(--cta-2));
    color:#fff;font-size:1.15rem;letter-spacing:.12em;font-weight:600;text-decoration:none;
    box-shadow:0 8px 24px rgba(157,131,196,.5), inset 0 1px 0 rgba(255,255,255,.35);
    position:relative;overflow:hidden;
  }
  .cta-btn::after{
    content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-20deg);
    animation:shine 3.2s ease-in-out infinite;
  }
  @keyframes shine{0%{left:-60%;}55%{left:130%;}100%{left:130%;}}
  .cta-btn .arrow{font-size:1rem;opacity:.9;}
  .cta-price{
    text-align:center;font-size:.78rem;letter-spacing:.08em;
    color:var(--gold-light);margin-bottom:8px;text-shadow:0 1px 6px rgba(0,0,0,.6);
  }
  .cta-price b{font-size:1rem;color:#fff;}

  /* フッター */
  .foot{
    max-width:var(--max);margin:0 auto;
    padding:30px 20px calc(110px + env(safe-area-inset-bottom));
    text-align:center;color:rgba(255,255,255,.5);
    font-size:.72rem;letter-spacing:.1em;line-height:2;background:#0e0a1a;
  }
  .foot .moon{color:var(--gold);font-size:1rem;letter-spacing:.3em;margin-bottom:6px;display:block;}

  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none;}
    .cta-btn::after{display:none;}
  }
</style>

<body>

<script>
/* ===== スクロールでふわっと表示 ===== */
(function(){
  var els = document.querySelectorAll('.reveal');
  if(!('IntersectionObserver' in window)){
    els.forEach(function(e){e.classList.add('show');});
  }else{
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(en.isIntersecting){ en.target.classList.add('show'); io.unobserve(en.target); }
      });
    },{threshold:0.12});
    els.forEach(function(e){io.observe(e);});
  }
})();

/* ===== 予約ボタンの表示制御（少しスクロールしたら出現） ===== */
(function(){
  var bar = document.getElementById('ctaBar');
  function onScroll(){
    if(window.scrollY > window.innerHeight*0.6){ bar.classList.add('visible'); }
    else{ bar.classList.remove('visible'); }
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  onScroll();
})();

/* ===== 金粉がパラパラ舞うアニメーション（軽量版・やや多め） ===== */
(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return;

  var canvas = document.getElementById('gold');
  var ctx = canvas.getContext('2d', {alpha:true});
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,1.5);
  var particles=[];

  function rand(a,b){return a+Math.random()*(b-a);}

  /* 金粒スプライトを一度だけ生成（毎フレームのグラデ生成を避けて高速化） */
  var SP=48;
  var sprite=document.createElement('canvas');
  sprite.width=SP; sprite.height=SP;
  (function(){
    var s=sprite.getContext('2d');
    var g=s.createRadialGradient(SP/2,SP/2,0,SP/2,SP/2,SP/2);
    g.addColorStop(0,'rgba(255,247,214,1)');
    g.addColorStop(0.25,'rgba(255,236,180,0.95)');
    g.addColorStop(0.55,'rgba(229,190,110,0.45)');
    g.addColorStop(1,'rgba(229,190,110,0)');
    s.fillStyle=g;
    s.beginPath(); s.arc(SP/2,SP/2,SP/2,0,Math.PI*2); s.fill();
  })();

  function resize(){
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = Math.round(W*DPR);
    canvas.height = Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);

    // 画面に見える範囲だけなので少数でOK（密度一定）／金粉やや多め
    var target = Math.round(W*H/8000);
    target = Math.max(45, Math.min(target, 120));
    if(particles.length < target){
      while(particles.length < target) particles.push(newParticle(true));
    }else{
      particles.length = target;
    }
  }

  function newParticle(anywhere){
    var size = rand(2.5,7);
    return {
      x: rand(0,W),
      y: anywhere ? rand(0,H) : rand(-30,-5),
      size: size,
      vy: rand(0.25,0.9)*(size/5),
      vx: rand(-0.2,0.2),
      sway: rand(0.3,1.1),
      swaySpeed: rand(0.008,0.02),
      phase: rand(0,Math.PI*2),
      alpha: rand(0.35,0.9),
      twinkle: rand(0.012,0.03),
      tphase: rand(0,Math.PI*2)
    };
  }

  var running=true;
  function draw(){
    if(!running) return;
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.phase += p.swaySpeed;
      p.y += p.vy;
      p.x += p.vx + Math.sin(p.phase)*p.sway*0.3;
      p.tphase += p.twinkle;
      if(p.y > H+12){ particles[i]=newParticle(false); continue; }
      var tw = 0.55 + 0.45*Math.sin(p.tphase);
      ctx.globalAlpha = Math.min(1, p.alpha*tw);
      var s = p.size;
      ctx.drawImage(sprite, p.x - s/2, p.y - s/2, s, s);
    }
    ctx.globalAlpha=1;
    ctx.globalCompositeOperation='source-over';
    requestAnimationFrame(draw);
  }

  // タブ非表示中は描画停止（省電力・軽量化）
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ running=false; }
    else if(!running){ running=true; requestAnimationFrame(draw); }
  });

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
